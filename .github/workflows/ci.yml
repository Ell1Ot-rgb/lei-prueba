name: CI - Validar Integridad de Contenedores y Código

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar Código del Repositorio
      uses: actions/checkout@v4

    - name: Configurar Entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Dependencias de Validación
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Verificar Errores de Sintaxis de Python
      run: |
        # Detener la compilación si hay errores de sintaxis o de nombres no definidos
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv,antigravity-connect
        # E501 es sobre el largo de las líneas (lo tratamos como advertencia)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,.venv,antigravity-connect

    - name: Validar Construcción del Dockerfile de Producción
      run: |
        docker build -t organismo_vivo_v100:test -f deploy_docker/Dockerfile .

    - name: Validar Archivos Docker Compose
      run: |
        # Validar la estructura del docker-compose de desarrollo
        docker compose -f sincronizacion-obsidiane/docker-compose.rag.yml config > /dev/null
        # Validar la estructura del docker-compose de producción
        docker compose -f deploy_docker/docker-compose.yml config > /dev/null
