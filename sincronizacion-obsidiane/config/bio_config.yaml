system:
  name: "Organismo Vivo v100.0"
  version: "100.0.0"
  mode: "production"
  device: "cpu"  # 'cuda' if GPU available
  
  # Feature Flags (v60-v100)
  enable_apoptosis: true    # v60
  enable_immune: true       # v68
  enable_temporal: true     # v71
  enable_quantum: true      # v90
  enable_dream: true        # v75
  enable_emotion: true      # v83
  enable_evolution: true    # v88

security:
  hmac_key_env: "BIO_DIGITAL_HMAC_KEY"
  rate_limit_window: 60
  max_requests: 100

immune:
  max_payload_size: 1048576  # 1MB
  rate_limit: 100
  entropy_threshold: 7.5

metabolic:
  cpu_quota: 0.85
  memory_quota: 0.85

temporal:
  input_dim: 128
  hidden_dim: 128
  batch_size: 32

governance:
  max_cpu: 0.95
  allowed_ops:
    - "read"
    - "write"
    - "compute"
    - "evolve"

logging:
  level: "INFO"
  format: "json"
