version: '3.8'

services:
  neo4j_obsidiane:
    image: neo4j:5.12.0
    container_name: neo4j_obsidiane
    ports:
      - "7475:7474" # HTTP (Acceso Web)
      - "7688:7687" # Bolt (Acceso Datos)
    environment:
      - NEO4J_AUTH=neo4j/fenomenologia2024
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_obsidiane_data:/data
    networks:
      - obsidiane_net

networks:
  obsidiane_net:
    driver: bridge

volumes:
  neo4j_obsidiane_data:
