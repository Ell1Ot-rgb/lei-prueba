# ============================================================================
# Docker Compose — RAG e Integración de Grafos (Producción VPS 1GB RAM)
# ============================================================================
#
# Versión ultra-optimizada para VPS de bajos recursos. Excluye n8n.
# ============================================================================

version: '3.8'

services:

  # ─── MEMGRAPH (Motor de Grafos en Memoria Ligero) ─────────────────────────
  memgraph:
    image: memgraph/memgraph:latest
    container_name: sistema_vivo_memgraph
    restart: unless-stopped
    ports:
      - "7687:7687"   # Bolt protocol
    volumes:
      - memgraph_data:/var/lib/memgraph
    environment:
      MEMGRAPH_BOLT_PORT: 7687
      MEMGRAPH_LOG_LEVEL: WARNING
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(); s.settimeout(2); s.connect(('localhost', 7687))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - RAG_network

  # ─── MEMGRAPH RAG SERVER (REST API) ───────────────────────────────────────
  memgraph_rag_server:
    image: memgraph_rag_server:latest
    container_name: memgraph_rag_server
    restart: unless-stopped
    ports:
      - "7688:7688"
    environment:
      - MEMGRAPH_HOST=memgraph
      - MEMGRAPH_PORT=7687
      - MEMGRAPH_RAG_ENABLED=true
      - MEMGRAPH_RAG_PORT=7688
      - SCHEMA_FREQ_THRESHOLD=2
      - MEMGRAPH_PPR_ALPHA=0.85
      - MEMGRAPH_PPR_TOP_K=10
    depends_on:
      memgraph:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - RAG_network

  # ─── NEO4J (Para Graffiti RAG / Persistencia Semántica) ───────────────────
  neo4j:
    image: neo4j:5.12.0
    container_name: neo4j_lightrag
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP Web UI (Admin)
      - "7690:7687"   # Bolt (Mapeado a 7690 para compatibilidad)
    environment:
      - NEO4J_AUTH=neo4j/fenomenologia2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=128M
      - NEO4J_server_memory_heap_max__size=256M
      - NEO4J_server_memory_pagecache_size=128M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - RAG_network

  # ─── LIGHTRAG (REST API - Un solo Worker) ──────────────────────────────────
  lightrag:
    image: sincronizacion-obsidiane-lightrag:latest
    container_name: lightrag_server
    restart: unless-stopped
    ports:
      - "8000:8000"   # LightRAG REST API
    environment:
      - LIGHTRAG_API_KEY=your_api_key_default
      - LIGHTRAG_PORT=8000
      - LIGHTRAG_WORKERS=1  # Reducido de 2 a 1 para optimizar el uso de CPU/RAM en VPS
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=fenomenologia2024
      - EMBEDDING_MODEL=paraphrase-MiniLM-L3-v2
      - TOKENIZER_MODEL=gpt2
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY:-dummy-key}
      - GROQ_API_KEY=${GROQ_API_KEY:-dummy-key}
      - OPENAI_API_KEY=sk-dummy-key
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - lightrag_data:/app/data
      - lightrag_cache:/app/cache
      - ./lightrag_custom_server.py:/app/lightrag_custom_server.py
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
    networks:
      - RAG_network

# ─── Redes e Infraestructura ───────────────────────────────────────────────
networks:
  RAG_network:
    name: sistema_vivo_rag_network
    driver: bridge

volumes:
  memgraph_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  lightrag_data:
    driver: local
  lightrag_cache:
    driver: local
