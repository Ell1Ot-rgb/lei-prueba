# Docker Compose - Stack Completo YO Estructural + GPU
# ======================================================
#
# Servicios:
# 1. yo-estructural-gpu: Aplicación principal con GPU
# 2. neo4j: Base de datos de grafos
# 3. redis: Cache y mensajería
# 4. lightrag: Sistema RAG
# 5. prometheus: Monitoreo (opcional)

version: '3.8'

services:
  # =============================================
  # YO ESTRUCTURAL - GPU
  # =============================================
  yo-estructural-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: yo-estructural-gpu

    # GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

    environment:
      # GPU settings
      - CUDA_VISIBLE_DEVICES=0
      - TOKENIZER_DEVICE=cuda
      - TOKENIZER_MODE=ultra
      - TOKENIZER_PRECISION=mixed
      - TOKENIZER_BATCH_SIZE=8
      - CLASIFICADOR_DEVICE=cuda

      # Neo4j connection
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-yourpassword}

      # Redis connection
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0

      # LightRAG
      - LIGHTRAG_HOST=lightrag
      - LIGHTRAG_PORT=8002

      # API keys (desde .env)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}

    ports:
      - "8000:8000" # API principal
      - "8001:8001" # Metrics

    volumes:
      - ./modelos:/app/modelos
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./estado:/app/estado
      - ./configuracion:/app/configuracion

    depends_on:
      - neo4j
      - redis

    networks:
      - yo-network

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================
  # NEO4J - Graph Database
  # =============================================
  neo4j:
    image: neo4j:5.14-community
    container_name: yo-neo4j

    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-yourpassword}
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=2G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4JLABS_PLUGINS=["apoc", "graph-data-science"]

    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt

    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/import
      - neo4j-plugins:/plugins

    networks:
      - yo-network

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-yourpassword}", "RETURN 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================
  # REDIS - Cache & Messaging
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: yo-redis

    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    networks:
      - yo-network

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # =============================================
  # LIGHTRAG - RAG System
  # =============================================
  lightrag:
    image: lightrag/lightrag:latest
    container_name: yo-lightrag

    environment:
      - OPENAI_API_KEY=${OPENROUTER_API_KEY} # Usar OpenRouter como backend
      - OPENAI_API_BASE=https://openrouter.ai/api/v1
      - VECTOR_DB=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-yourpassword}

    ports:
      - "8002:8002"

    volumes:
      - lightrag-data:/data

    depends_on:
      - neo4j

    networks:
      - yo-network

    restart: unless-stopped

  # =============================================
  # PROMETHEUS - Monitoring (Opcional)
  # =============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: yo-prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

    networks:
      - yo-network

    restart: unless-stopped

    profiles:
      - monitoring

  # =============================================
  # GRAFANA - Dashboard (Opcional)
  # =============================================
  grafana:
    image: grafana/grafana:latest
    container_name: yo-grafana

    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis-datasource

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards

    depends_on:
      - prometheus

    networks:
      - yo-network

    restart: unless-stopped

    profiles:
      - monitoring

# =============================================
# VOLUMES
# =============================================
volumes:
  neo4j-data:
  neo4j-logs:
  neo4j-import:
  neo4j-plugins:
  redis-data:
  lightrag-data:
  prometheus-data:
  grafana-data:

    # =============================================
    # NETWORKS
    # =============================================
networks:
  yo-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
